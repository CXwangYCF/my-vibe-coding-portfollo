<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>王晨曦 | Rain Portfolio</title>
  <meta
    name="description"
    content="王晨曦作品集首页，雨夜公车意象与手掌接雨交互场景。"
  />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Noto+Serif+SC:wght@400;500;600&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="./portfolio.css" />
</head>
<body>
  <div class="page-noise" aria-hidden="true"></div>
  <div class="page-fog" aria-hidden="true"></div>

  <div class="palm-cursor" id="palmCursor" aria-hidden="true">
    <div class="palm-glow"></div>
    <svg viewBox="0 0 140 180" class="palm-shape">
      <path
        d="M95 24c7 0 12 6 12 14v30c0 3 2 5 5 5s5-2 5-5V18c0-8 5-14 12-14 8 0 13 6 13 14v72c0 22-6 45-18 63-10 15-27 23-44 23-19 0-35-10-46-27-11-17-18-40-18-61 0-9 5-16 13-16 7 0 12 5 14 13l4 18c1 3 3 4 6 4 3 0 5-2 5-5V31c0-8 5-14 12-14s12 6 12 14v35c0 3 2 5 5 5s5-2 5-5V24c0-8 5-14 12-14 8 0 13 6 13 14v38c0 3 2 5 5 5s5-2 5-5V24c0-8 5-14 12-14Z"
      />
    </svg>
  </div>

  <main class="hero-page">
    <div class="scene-shell" id="sceneShell">
      <div class="scene-backdrop" id="sceneBackdrop" aria-hidden="true"></div>
      <div class="scene-overlay" aria-hidden="true"></div>
      <div class="depth-haze haze-left" data-depth="slow" aria-hidden="true"></div>
      <div class="depth-haze haze-center" data-depth="mid" aria-hidden="true"></div>
      <div class="depth-haze haze-right" data-depth="float" aria-hidden="true"></div>
      <div class="depth-shaft shaft-left" data-depth="slow" aria-hidden="true"></div>
      <div class="depth-shaft shaft-right" data-depth="mid" aria-hidden="true"></div>
      <div class="bus-glow" data-depth="mid" aria-hidden="true"></div>

      <canvas class="rain-canvas" id="rainCanvas" aria-hidden="true"></canvas>
      <div class="water-shell" id="waterShell" aria-hidden="true">
        <canvas class="water-canvas" id="waterCanvas"></canvas>
      </div>

      <header class="topbar">
        <a class="brand" href="./index.html" data-cursor-hover>
          <span class="brand-cn">王晨曦</span>
          <span class="brand-en">Rain-held Portfolio</span>
        </a>

        <nav class="topnav" aria-label="Primary">
          <a href="./index.html" data-cursor-hover>Index</a>
          <a href="./reqpilot-mvp/index.html" data-cursor-hover>Projects</a>
          <button
            type="button"
            class="nav-contact"
            data-copy="cxwang396@163.com"
            data-cursor-hover
          >
            Contact
          </button>
        </nav>
      </header>

      <section class="hero-copy" data-depth="slow">
        <p class="eyebrow">Rain Interaction</p>
        <h1>把雨接住，让静水替你回声。</h1>
        <p class="hero-text">
          背景换成雨夜公车后，我把首页交互升级成“手掌接雨”。细雨会被掌心轻轻吸附，
          没接住的部分落进水面，留下克制而层次分明的涟漪。
        </p>
      </section>

      <a
        class="cta-pill"
        href="./reqpilot-mvp/index.html"
        data-cursor-hover
      >
        <span>View our work ↘</span>
      </a>

      <div class="bottom-left">
        <a
          class="icon-chip"
          href="./math-ai-diagnosis-mvp/index.html"
          aria-label="Open wrapped project"
          data-cursor-hover
        >
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M4 18V8" />
            <path d="M9 18V5" />
            <path d="M14 18V11" />
            <path d="M19 18V7" />
          </svg>
        </a>
        <a
          class="wrapped-pill"
          href="./math-ai-diagnosis-mvp/index.html"
          data-cursor-hover
        >
          Our 2026 Wrapped
        </a>
      </div>

      <button
        type="button"
        class="globe-chip"
        id="globeButton"
        aria-label="Open global note"
        data-cursor-hover
      >
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="12" cy="12" r="9"></circle>
          <path d="M3.5 12h17"></path>
          <path d="M12 3c2.8 2.4 4.2 5.4 4.2 9S14.8 18.6 12 21"></path>
          <path d="M12 3C9.2 5.4 7.8 8.4 7.8 12s1.4 6.6 4.2 9"></path>
        </svg>
      </button>

      <div class="copyright">©2026</div>
    </div>
  </main>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>
  <script src="./portfolio.js"></script>
</body>
</html>
