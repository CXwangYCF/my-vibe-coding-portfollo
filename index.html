<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>王晨曦 | Portfolio</title>
  <meta
    name="description"
    content="王晨曦的作品集首页。以烟雨江南式的淡雅绿色为基调，展示 AI 产品与交互作品。"
  />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Manrope:wght@400;500;600;700&family=Noto+Serif+SC:wght@400;500;600&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="./portfolio.css" />
</head>
<body>
  <div class="page-grain" aria-hidden="true"></div>
  <div class="page-haze" aria-hidden="true"></div>
  <div class="custom-cursor" id="cursor" aria-hidden="true"></div>

  <main class="hero-page">
    <header class="topbar">
      <a class="brand" href="./index.html" data-cursor-hover>
        <span class="brand-cn">王晨曦</span>
        <span class="brand-en">wangchenxi studio</span>
      </a>

      <nav class="topnav" aria-label="Primary">
        <a href="./index.html" data-cursor-hover>Index</a>
        <a href="./reqpilot-mvp/index.html" data-cursor-hover>Projects</a>
        <button
          type="button"
          class="nav-contact"
          data-copy="cxwang396@163.com"
          data-cursor-hover
        >
          Contact
        </button>
      </nav>
    </header>

    <section class="hero-stage" aria-label="Portfolio hero scene">
      <div class="mist-layer mist-back" data-depth="slow" aria-hidden="true"></div>
      <div class="mist-layer mist-front" data-depth="mid" aria-hidden="true"></div>
      <div class="light-shaft shaft-one" data-depth="slow" aria-hidden="true"></div>
      <div class="light-shaft shaft-two" data-depth="mid" aria-hidden="true"></div>

      <div class="scene-orbit" id="sceneOrbit">
        <div class="scene-depth" data-depth="deep">
          <div class="branch branch-left" aria-hidden="true"></div>
          <div class="branch branch-right" aria-hidden="true"></div>

          <div class="wall wall-left">
            <div class="opening arch arch-large"></div>
            <div class="opening slit slit-left"></div>
            <div class="opening arch arch-mid"></div>
          </div>

          <div class="wall wall-right">
            <div class="opening slit slit-tall"></div>
            <div class="opening slit slit-right"></div>
          </div>

          <div class="platform">
            <div class="stairs" aria-hidden="true">
              <span></span>
              <span></span>
              <span></span>
              <span></span>
              <span></span>
            </div>
            <div class="pearl-sphere" data-depth="float" aria-hidden="true"></div>
          </div>

          <div class="stone stone-left" data-depth="mid" aria-hidden="true"></div>
          <div class="stone stone-right" data-depth="float" aria-hidden="true"></div>
          <div class="stone stone-far" data-depth="slow" aria-hidden="true"></div>
        </div>
      </div>

      <div class="water-shell" id="waterShell" aria-hidden="true">
        <div class="water-haze"></div>
        <canvas class="water-canvas" id="waterCanvas"></canvas>
      </div>

      <div class="hero-copy" data-depth="slow">
        <p class="scene-kicker">Misty Jiangnan</p>
        <h1>江南的雾，落进一页静水之中。</h1>
        <p>
          我把作品集首页收成一幕安静的空间叙事，用低饱和鼠尾草绿、柔雾水面和克制交互，
          让 AI 产品作品先以气质开场，再引向具体项目。
        </p>
      </div>

      <a
        class="cta-pill"
        href="./reqpilot-mvp/index.html"
        data-cursor-hover
      >
        <span>View our work ↘</span>
      </a>

      <div class="bottom-left">
        <a
          class="icon-chip"
          href="./math-ai-diagnosis-mvp/index.html"
          aria-label="Open wrapped project"
          data-cursor-hover
        >
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M4 18V8" />
            <path d="M9 18V5" />
            <path d="M14 18V11" />
            <path d="M19 18V7" />
          </svg>
        </a>
        <a
          class="wrapped-pill"
          href="./math-ai-diagnosis-mvp/index.html"
          data-cursor-hover
        >
          Our 2026 Wrapped
        </a>
      </div>

      <button
        type="button"
        class="globe-chip"
        id="globeButton"
        aria-label="Open global note"
        data-cursor-hover
      >
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="12" cy="12" r="9"></circle>
          <path d="M3.5 12h17"></path>
          <path d="M12 3c2.8 2.4 4.2 5.4 4.2 9S14.8 18.6 12 21"></path>
          <path d="M12 3C9.2 5.4 7.8 8.4 7.8 12s1.4 6.6 4.2 9"></path>
        </svg>
      </button>

      <div class="copyright">©2026</div>
    </section>
  </main>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>
  <script src="./portfolio.js"></script>
</body>
</html>
